<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results Summary Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="result">
      <h2>Your Result</h2>
      <div class="score">
        <p class="number">76</p>
        <p class="total">of 100</p>
      </div>
      <h3>Great</h3>
      <p class="description">
        You scored higher than 65% of the people who have taken these tests.
      </p>
    </section>

    <section class="summary">
      <h2>Summary</h2>
      <ul class="categories">
        <li class="reaction">Reaction <span>80 / 100</span></li>
        <li class="memory">Memory <span>92 / 100</span></li>
        <li class="verbal">Verbal <span>61 / 100</span></li>
        <li class="visual">Visual <span>72 / 100</span></li>
      </ul>
      <button>Continue</button>
    </section>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Phuti Johanna Manamela</a>.
  </footer>
</body>
</html>
